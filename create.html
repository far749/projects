<html>

        <title>Facebook</title>

    <body>
        <h2 id="id">Get started on Facebook</h2>
        <p >Create an account to connect with friends, family and communities of people who share your interests.</p>
        <label>Name</label>
        <br>
        <form>
            <input type="text" name="first name" placeholder="first name">
            <input type="text" name="surname" placeholder="surname">
            <br>
            <br>
            <label>Date of birth &quest;</label>
            <br>
            <select>
                <option name="Day" disabled selected>Day</option>
                 <option>1</option>
                 <option>2</option>
                 <option>3</option>
                 <option>4</option>
            </select>
            <select>
                <option name="Month" disabled selected>Month</option>
                 <option>January</option>
                 <option>febuary</option>
                 <option>March</option>
                 <option>April</option>
            </select>

            <select>
                <option name="Year" disabled selected>Year</option>
                 <option>2001</option>
                 <option>2002</option>
                 <option>2003</option>
                 <option>2004</option>
            </select>
            <br>
           <label>
            <input type="radio" name="Gender" value="male">male
           </label>
            <label>
                <input type="radio" name="Gender" value="female">female
            </label>
            <label>
                <input type="radio" name="Gender" value="custom">custom
            </label>
            
            
            <br>
            <br>
            <label>  Mobile number or email address </label>
            <br>
            <input type="text" name=" email or number" placeholder="Mobile number or email address">
            <br>
            <p>You may receive notifications from us. <a href="https://www.facebook.com/help/297947214257999/?helpref=uf_share">ask for your contact<br> information</a></p>
            <label>Password</label>
            
            <br>
            <input type="password" name="password"placeholder="Password">
            <input type="checkbox">View Password
            <br>

            <input type="submit">

            <br>
             <input type="button" value="i already have an account">
             <br>




            
            


        </form>
    </body>
